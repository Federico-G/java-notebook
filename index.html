<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Notebook</title>
    <meta name="description" content="Notebook de Java 100% en el navegador">
    <link rel="stylesheet" href="css/notebook.css">

    <script type="importmap">
    {
        "imports": {
            "style-mod": "https://esm.sh/style-mod@4.1.2",
            "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
            "crelt": "https://esm.sh/crelt@1.0.6",
            "@marijn/find-cluster-break": "https://esm.sh/@marijn/find-cluster-break@1.0.2",
            "@lezer/common": "https://esm.sh/*@lezer/common@1.2.3",
            "@lezer/highlight": "https://esm.sh/*@lezer/highlight@1.2.1",
            "@lezer/lr": "https://esm.sh/*@lezer/lr@1.4.2",
            "@lezer/java": "https://esm.sh/*@lezer/java@1.1.3",
            "@codemirror/autocomplete": "https://esm.sh/*@codemirror/autocomplete@6.18.4",
            "@codemirror/commands": "https://esm.sh/*@codemirror/commands@6.7.1",
            "@codemirror/language": "https://esm.sh/*@codemirror/language@6.10.6",
            "@codemirror/lang-java": "https://esm.sh/*@codemirror/lang-java@6.0.1",
            "@codemirror/lint": "https://esm.sh/*@codemirror/lint@6.8.4",
            "@codemirror/search": "https://esm.sh/*@codemirror/search@6.5.8",
            "@codemirror/state": "https://esm.sh/*@codemirror/state@6.5.0",
            "@codemirror/view": "https://esm.sh/*@codemirror/view@6.35.0",
            "codemirror": "https://esm.sh/*codemirror@6.0.1",
            "marked": "https://esm.sh/marked@15.0.4"
        }
    }
    </script>
</head>
<body>
    <!-- Toolbar -->
    <header id="toolbar">
        <h1>Java Notebook</h1>
        <div class="toolbar-spacer"></div>
        <button class="btn" id="btn-import">Importar</button>
        <button class="btn" id="btn-export">Exportar</button>
        <div class="dropdown" id="examples-dropdown">
            <button class="btn" id="btn-examples">Ejemplos &#9662;</button>
            <div class="dropdown-menu" id="examples-menu"></div>
        </div>
        <div class="dropdown" id="settings-dropdown">
            <button class="btn" id="btn-settings">&#9881;</button>
            <div class="dropdown-menu dropdown-menu--right" id="settings-menu">
                <div class="settings-group">
                    <label class="settings-label">Identación</label>
                    <div class="settings-row">
                        <button class="dropdown-item settings-indent" data-size="2">2</button>
                        <button class="dropdown-item settings-indent" data-size="4">4</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Loading overlay -->
    <div id="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div id="loading-status">Inicializando compilador...</div>
        </div>
    </div>

    <!-- Tab bar -->
    <nav id="tab-bar"></nav>

    <!-- Notebook actions (populated by cell-manager) -->
    <div id="notebook-actions"></div>

    <!-- Scrollable notebook content -->
    <main id="notebook-container"></main>

    <!-- Main app -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
